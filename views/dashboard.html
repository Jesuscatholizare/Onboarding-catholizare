<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Onboarding - Catholizare</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f4f7fa;min-height:100vh}
.hdr{background:linear-gradient(135deg,#001A55 0%,#003ABA 100%);padding:20px 24px;color:white;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:18px}.hdr span{opacity:0.8;font-size:13px}
.wrap{max-width:750px;margin:0 auto;padding:20px 16px}
.sec{background:white;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,0.06);margin-bottom:16px;overflow:hidden}
.sec-hdr{padding:16px 20px;border-bottom:1px solid #f1f3f5;display:flex;align-items:center;gap:10px}
.sec-hdr h2{font-size:16px;color:#001A55;font-weight:700}
.sec-hdr .num{width:28px;height:28px;background:#001A55;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.sec-body{padding:20px}
.step{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:10px;text-decoration:none;color:inherit;transition:all 0.15s}
.step:hover{border-color:#003ABA;background:#f8faff}
.step .ico{font-size:24px;flex-shrink:0}
.step h3{font-size:14px;color:#001A55;margin-bottom:2px}
.step p{font-size:12px;color:#888}
.step .arr{margin-left:auto;color:#ccc;font-size:18px}
.doc-box{padding:12px 14px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:10px}
.doc-box h4{font-size:13px;color:#001A55;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.doc-box p{font-size:11px;color:#666;margin-bottom:6px;line-height:1.5}
.doc-box .imp{color:#dc3545;font-weight:600}
.btn{display:block;text-align:center;padding:14px;border-radius:10px;text-decoration:none;font-size:15px;font-weight:700;margin-bottom:10px;border:none;width:100%;cursor:pointer}
.btn-navy{background:linear-gradient(135deg,#001A55,#003ABA);color:white}.btn-navy:hover{opacity:0.9}
.btn-green{background:#25D366;color:white}.btn-green:hover{background:#20bd5a}
.btn-outline{background:white;color:#001A55;border:2px solid #001A55}.btn-outline:hover{background:#f0f4ff}
.note{font-size:12px;color:#888;text-align:center;margin-top:6px;line-height:1.5}
.wa-row{display:flex;gap:10px;margin-bottom:10px}.wa-row a{flex:1}
.loading{text-align:center;padding:60px 20px;color:#666}
</style>
</head>
<body>

<div class="hdr">
  <div><h1>Catholizare Pro</h1><span>Panel del Profesional</span></div>
  <span id="headerName"></span>
</div>

<div class="wrap" id="content">
  <div class="loading" id="loadingMsg">Cargando tu informacion...</div>
</div>

<script src="public/js/api.js"></script>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  if (!token) { window.location.href = 'error?reason=no_token'; return; }

  var BASE = '/catholizare_sistem/onboarding';
  var WA = 'https://wa.me/5215510223883';

  API.getStatus(token).then(function(status) {
    if (!status || !status.success) { window.location.href = 'error?reason=invalid_token'; return; }

    var nombre = status.nombre || '';
    document.getElementById('headerName').textContent = nombre;
    document.title = 'Mi Onboarding - ' + nombre;

    var waSync = WA + '?text=' + encodeURIComponent('Hola, soy ' + nombre + ' y quiero ponerme de acuerdo para sincronizar mi agenda en Catholizare Pro');
    var waZoom = WA + '?text=' + encodeURIComponent('Hola, soy ' + nombre + ' y quiero agendar mi reunion Zoom de bienvenida e induccion en Catholizare Pro');
    var waSupervision = WA + '?text=' + encodeURIComponent('Hola, soy ' + nombre + ' y quiero agendar mi sesion de supervision de fe y espiritualidad en Catholizare Pro');
    var waHelp = WA + '?text=' + encodeURIComponent('Hola, soy ' + nombre + ' y necesito ayuda con mi onboarding en Catholizare Pro');

    document.getElementById('content').innerHTML =
      '<div class="sec"><div class="sec-hdr"><div class="num">1</div><h2>Completa tu onboarding</h2></div><div class="sec-body">' +
      '<a class="step" href="' + BASE + '/aceptacion-terminos?token=' + token + '">' +
      '<span class="ico">&#x1F4DC;</span><div><h3>Aceptar Terminos y Condiciones</h3><p>Revisa y firma los documentos legales</p></div><span class="arr">&rsaquo;</span></a>' +
      '<a class="step" href="' + BASE + '/informacion-perfil?token=' + token + '">' +
      '<span class="ico">&#x1F4DD;</span><div><h3>Completar tu Perfil Profesional</h3><p>Poblaciones, enfoques, modalidad y horarios</p></div><span class="arr">&rsaquo;</span></a>' +
      '</div></div>' +

      '<div class="sec"><div class="sec-hdr"><div class="num">2</div><h2>Sube tus documentos</h2></div><div class="sec-body">' +
      '<p style="font-size:13px;color:#555;margin-bottom:14px;line-height:1.6;">Sube los documentos que tengas disponibles. <strong>No es necesario que cuentes con todos en este momento</strong> — puedes regresar cuando quieras para completar los que te falten.</p>' +

      '<div class="doc-box"><h4>&#x1F4C4; Curriculum Vitae</h4>' +
      '<p>Solo PDF o Word (.docx). <span class="imp">Es muy importante que el archivo contenga texto editable</span> (no imagenes escaneadas). En la seccion de estudios, por favor incluye: <em>Ano de obtencion / Titulo obtenido / Institucion</em>.</p>' +
      '<input type="file" id="fileCV" accept=".pdf,.doc,.docx" style="font-size:12px;"></div>' +

      '<div class="doc-box"><h4>&#x1F393; Cedula Profesional</h4>' +
      '<p>Foto o escaneo legible (PDF, JPG o PNG).</p>' +
      '<input type="file" id="fileCedula" accept=".pdf,.jpg,.jpeg,.png" style="font-size:12px;"></div>' +

      '<div class="doc-box"><h4>&#x1F4F8; Foto de Perfil Profesional</h4>' +
      '<p>Imagen de buena calidad para tu perfil en la plataforma (JPG o PNG).</p>' +
      '<input type="file" id="fileFoto" accept=".jpg,.jpeg,.png" style="font-size:12px;"></div>' +

      '<div class="doc-box"><h4>&#x2709;&#xFE0F; Carta de Recomendacion Sacerdotal</h4>' +
      '<p>Carta de un sacerdote que te conozca. Si aun no la tienes, no te preocupes, puedes subirla mas adelante.</p>' +
      '<input type="file" id="fileCarta" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style="font-size:12px;"></div>' +

      '<button onclick="uploadDocs()" id="btnUpload" class="btn btn-navy">Subir Documentos</button>' +
      '<p id="uploadStatus" style="text-align:center;margin-top:6px;font-size:13px;display:none;"></p>' +
      '<p class="note">Solo se subiran los archivos que hayas seleccionado.</p>' +
      '</div></div>' +

      '<div class="sec"><div class="sec-hdr"><div class="num">3</div><h2>Coordina con nosotros</h2></div><div class="sec-body">' +
      '<p style="font-size:13px;color:#555;margin-bottom:14px;line-height:1.6;">Para avanzar en tu proceso, necesitaras coordinar dos reuniones con nuestro equipo. Escribenos por WhatsApp para agendar:</p>' +
      '<div class="wa-row">' +
      '<a class="btn btn-outline" href="' + waSync + '" target="_blank">Sincronizar Agenda</a>' +
      '<a class="btn btn-outline" href="' + waZoom + '" target="_blank">Reunion Zoom</a></div>' +
      '<a class="btn btn-outline" href="' + waSupervision + '" target="_blank" style="margin-bottom:10px;">Agendar Supervision de Fe y Espiritualidad</a>' +
      '<p class="note">La sincronizacion de agenda, la reunion Zoom de induccion (60 min) y la supervision se coordinan por WhatsApp con nuestro equipo.</p>' +
      '</div></div>' +

      '<a class="btn btn-green" href="' + waHelp + '" target="_blank" style="margin-bottom:16px;">Necesitas ayuda? Escribenos por WhatsApp</a>';
  }).catch(function() {
    document.getElementById('content').innerHTML = '<div class="loading">Error al cargar datos. Verifica tu conexion.</div>';
  });

  // File upload
  window.uploadDocs = function() {
    var files = {
      cv: document.getElementById('fileCV').files[0],
      cedula: document.getElementById('fileCedula').files[0],
      foto: document.getElementById('fileFoto').files[0],
      carta: document.getElementById('fileCarta').files[0]
    };
    var hasAny = files.cv || files.cedula || files.foto || files.carta;
    if (!hasAny) { alert('Selecciona al menos un archivo para subir.'); return; }

    document.getElementById('btnUpload').disabled = true;
    document.getElementById('btnUpload').textContent = 'Subiendo...';
    var statusEl = document.getElementById('uploadStatus');
    statusEl.style.display = 'block';
    statusEl.style.color = '#003ABA';
    statusEl.textContent = 'Procesando archivos...';

    var pending = 0, done = 0, errors = [];

    function checkDone() {
      done++;
      statusEl.textContent = 'Subido ' + done + ' de ' + pending + '...';
      if (done >= pending) {
        document.getElementById('btnUpload').disabled = false;
        document.getElementById('btnUpload').textContent = 'Subir Documentos';
        if (errors.length) {
          statusEl.textContent = 'Algunos archivos tuvieron error: ' + errors.join(', ');
        } else {
          statusEl.style.color = '#15803d';
          statusEl.textContent = 'Documentos subidos exitosamente!';
        }
      }
    }

    function sendFile(file, type) {
      var reader = new FileReader();
      reader.onload = function(e) {
        API.uploadFile(token, e.target.result, file.name, type).then(function(r) {
          if (!r || !r.success) errors.push(type);
          checkDone();
        }).catch(function() { errors.push(type); checkDone(); });
      };
      reader.readAsDataURL(file);
    }

    if (files.cv) pending++;
    if (files.cedula) pending++;
    if (files.foto) pending++;
    if (files.carta) pending++;
    if (files.cv) sendFile(files.cv, 'cv');
    if (files.cedula) sendFile(files.cedula, 'cedula');
    if (files.foto) sendFile(files.foto, 'foto');
    if (files.carta) sendFile(files.carta, 'carta');
  };
})();
</script>
</body>
</html>
