<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil Profesional - Catholizare Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --navy-primary: #001A55;
      --navy-dark: #000F33;
      --blue-accent: #003ABA;
      --gold-accent: #D4AF37;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      padding: 20px;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 26, 85, 0.1);
      overflow: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, var(--navy-primary) 0%, var(--blue-accent) 100%);
      color: white;
      padding: 40px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    
    .header p {
      opacity: 0.9;
      font-size: 16px;
    }
    
    .content {
      padding: 40px;
    }
    
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }
    
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group.full {
      grid-column: span 2;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--navy-primary);
      font-size: 14px;
    }
    
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--blue-accent);
      box-shadow: 0 0 0 3px rgba(0, 58, 186, 0.1);
    }
    
    select[multiple] {
      height: 120px;
    }
    
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    
    .btn-submit {
      width: 100%;
      background: var(--navy-primary);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
    }
    
    .btn-submit:hover {
      background: var(--navy-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(0, 26, 85, 0.3);
    }
    
    .btn-submit:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }
    
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--blue-accent);
      text-decoration: none;
      font-size: 14px;
    }
    
    .back-link:hover {
      text-decoration: underline;
    }
    
    .helper-text {
      font-size: 12px;
      color: #6c757d;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>👤 Perfil Profesional</h1>
      <p>Completa tu información para aparecer en el directorio</p>
    </div>

    <div class="content">
      <form id="perfilForm">
        <div class="grid">
          
          <div class="form-group">
            <label>Poblaciones que atiende</label>
            <select multiple name="poblaciones" required>
              <option value="Niños">Niños</option>
              <option value="Adolescentes">Adolescentes</option>
              <option value="Adultos">Adultos</option>
              <option value="Parejas">Parejas</option>
              <option value="Familias">Familias</option>
              <option value="Ancianos">Ancianos</option>
            </select>
            <div class="helper-text">Mantén presionado Ctrl (Cmd en Mac) para seleccionar varios</div>
          </div>
          
          <div class="form-group">
            <label>Modalidad de Atención</label>
            <select name="modalidad" required>
              <option value="">Selecciona una opción</option>
              <option value="Online">Online</option>
              <option value="Presencial">Presencial</option>
              <option value="Mixta">Mixta (Online y Presencial)</option>
            </select>
          </div>
          
          <div class="form-group full">
            <label>Tipos de Terapia y Enfoque</label>
            <input type="text" name="tipos" required placeholder="Ej: Terapia Cognitivo-Conductual, Logoterapia, Terapia Familiar...">
            <div class="helper-text">Separa con comas los diferentes tipos de terapia que ofreces</div>
          </div>
          
          <div class="form-group full">
            <label>Horarios de Disponibilidad</label>
            <textarea name="horarios" required placeholder="Ej: Lunes a Viernes de 9:00 a 18:00, Sábados de 10:00 a 14:00"></textarea>
            <div class="helper-text">Describe tu disponibilidad horaria</div>
          </div>
          
        </div>

        <button type="submit" id="btnGuardar" class="btn-submit">💾 Guardar y Continuar</button>
      </form>

      <a href="javascript:history.back()" class="back-link">← Volver al dashboard</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const TOKEN = params.get('token') || '';
    const BASE = 'https://profesionales.catholizare.com/catholizare_sistem/onboarding';
    const PROXY = BASE + '/api.php';

    function callProxy(action, data) {
      return fetch(PROXY + '?action=' + action, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data || {})
      }).then(function(r) { return r.json(); });
    }

    document.getElementById('perfilForm').onsubmit = function(e) {
      e.preventDefault();

      if (!TOKEN) {
        alert('Error: Falta el token');
        return;
      }

      const poblacionesSelect = document.getElementsByName('poblaciones')[0];
      const poblaciones = Array.from(poblacionesSelect.selectedOptions).map(o => o.value).join(', ');

      const formData = {
        poblaciones: poblaciones,
        modalidad: document.getElementsByName('modalidad')[0].value,
        terapias: document.getElementsByName('tipos')[0].value,
        horarios: document.getElementsByName('horarios')[0].value
      };

      const btn = document.getElementById('btnGuardar');
      btn.disabled = true;
      btn.innerText = "Guardando...";

      callProxy('saveProfileInfo', { token: TOKEN, formData: formData })
        .then(function(r) {
          if (r && r.success) {
            alert('¡Perfil actualizado exitosamente!');
            window.location.href = BASE + '/index.html?token=' + TOKEN;
          } else {
            alert('Error: ' + (r ? r.message : 'Sin respuesta'));
            btn.disabled = false;
            btn.innerText = "💾 Guardar y Continuar";
          }
        })
        .catch(function(err) {
          alert('Error: ' + err.message);
          btn.disabled = false;
          btn.innerText = "💾 Guardar y Continuar";
        });
    };
  </script>
</body>
</html>
