<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; background: #f4f7fa; }
    .upload-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
    .btn-cath { background: #001A55; color: white; }
  </style>
</head>
<body>
  <div class="upload-box">
    <div style="display:inline-flex;background:#001A55;padding:6px 14px;border-radius:10px;margin-bottom:16px;"><img src="https://profesionales.catholizare.com/wp-content/uploads/2024/03/logo-Pro-2024-bco-1-1536x251.png" alt="Catholizare Pro" style="height:26px;width:auto;display:block;"></div>
    <h4 id="title">Cargar Documento</h4>
    <p id="desc" class="text-muted small"></p>
    <input type="file" id="fileInput" class="form-control mb-3" accept=".pdf,jpg,png">
    <button onclick="processFile()" id="btnUp" class="btn btn-cath w-100">Subir Archivo</button>
    <button onclick="goBack()" class="btn btn-link mt-2">Cancelar</button>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const TYPE = (urlParams.get('type') || '').toLowerCase().trim();
    const BASE = 'https://profesionales.catholizare.com/catholizare_sistem/onboarding';
    const PROXY = BASE + '/api.php';
    // Leer token de sessionStorage (ya no de URL)
    const TOKEN = sessionStorage.getItem('onb_token') || '';
    if (!TOKEN) {
      window.location.href = BASE + '/index.html';
    }

    if (!TYPE) {
      document.getElementById('desc').innerText = "Falta el parámetro type (ej: titulo, cedula, foto, carta).";
    } else {
      document.getElementById('title').innerText = "Cargar " + TYPE.toUpperCase();
    }

    function goBack() {
      window.location.href = BASE + "/Public_Dashboard.html";
    }

    function processFile() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) return alert("Selecciona un archivo");
      if (!TOKEN) return alert("Falta token");
      if (!TYPE) return alert("Falta type (titulo/cedula/foto/carta)");

      const btn = document.getElementById('btnUp');
      btn.disabled = true;
      btn.innerText = "Subiendo...";

      const reader = new FileReader();
      reader.onload = function(e) {
        fetch(PROXY + '?action=uploadFile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: TOKEN, base64Data: e.target.result, fileName: file.name, fileType: TYPE })
        })
        .then(function(r) { return r.json(); })
        .then(function(res) {
          if (res && res.success) {
            alert("Archivo subido con éxito");
            goBack();
          } else {
            alert("Error: " + (res ? res.message : 'Respuesta vacía'));
            btn.disabled = false;
            btn.innerText = "Subir Archivo";
          }
        })
        .catch(function(err) {
          alert("Error: " + err.message);
          btn.disabled = false;
          btn.innerText = "Subir Archivo";
        });
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
